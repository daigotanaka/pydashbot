map_file: data/room_map.json
calibration: data/calibration/calibration_20260613-18-39-49.json
duration_seconds: 60
territory_size_mm: 1000

# Policies selected by name.
policies:
  # Exploration (which way to drive while mapping):
  # - conservative  : bounded territories, frontier-alignment objective
  # - coverage      : bounded territories, maximize newly-visited cells per leg
  # - novelty       : no territory limit, head toward unexplored space
  # - wall-follower : arc-based; drive to a wall, then hug it with arcs
  # - preset        : replay a fixed move/turn course (give it an input_file,
  #                   as a mapping instead of a bare name):
  #     exploration:
  #       name: preset
  #       input_file: data/preset_courses/course.json
  exploration: coverage
  # Navigation (route planning between points; go-home is its caller):
  # - d-star-lite       : replan with soft costs around failed approaches
  # - hard-blocked-edge : permanently exclude every corridor marked blocked
  navigation: hard-blocked-edge

docking:
  # false to skip the initial dock positioning sequence
  init: false

dashboard:
  active: true
  host: 0.0.0.0
  port: 8000
